<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Activities</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f8;
}

#topbar{
    background:white;
    border-bottom:1px solid #dcdcdc;
    padding:10px 15px;
    font-size:18px;
    font-weight:bold;
}

#container{
    display:flex;
    height:calc(100vh - 50px);
}

#menu{
    width:220px;
    background:#ffffff;
    border-right:1px solid #dcdcdc;
    overflow-y:auto;
}

.gamebtn{
    padding:12px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}
.gamebtn:hover{
    background:#e9f0f7;
}

#gamearea{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}

canvas{
    border:1px solid #ccc;
}
</style>
</head>

<body>

<div id="topbar">Interactive Practice Tools</div>

<div id="container">

<div id="menu">
<div class="gamebtn" onclick="loadGame('runner')">Runner</div>
<div class="gamebtn" onclick="loadGame('jump')">Jump</div>
<div class="gamebtn" onclick="loadGame('pong')">Pong</div>
</div>

<div id="gamearea">
<canvas id="game" width="640" height="400"></canvas>
</div>

</div>

<script>
let currentGame=null;
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function loadGame(name){
    if(currentGame && currentGame.stop) currentGame.stop();
    ctx.clearRect(0,0,canvas.width,canvas.height);
    currentGame=window.games[name](canvas,ctx);
}
</script>

<script src="games.js"></script>
</body>
</html>
