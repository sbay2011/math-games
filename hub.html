<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Interactive Game Hub</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;}
#topbar{background:white;border-bottom:1px solid #dcdcdc;padding:10px 15px;font-size:18px;font-weight:bold;}
#container{display:flex;height:calc(100vh - 50px);}
#menu{width:250px;background:#ffffff;border-right:1px solid #dcdcdc;overflow-y:auto;}
.gamebtn{padding:12px;cursor:pointer;border-bottom:1px solid #eee;}
.gamebtn:hover{background:#e9f0f7;}
.category{font-weight:bold;padding:10px 12px;color:#333;}
#gamearea{flex:1;display:flex;justify-content:center;align-items:center;background:white;position:relative;}
canvas{border:1px solid #ccc;}
#panic{position:absolute;top:10px;right:10px;padding:5px 8px;background:#eee;border:1px solid #ccc;cursor:pointer;}
</style>
</head>
<body>

<div id="topbar">Interactive Game Hub</div>
<div id="container">
  <div id="menu">
    <div class="category">Arcade</div>
    <div class="gamebtn" onclick="loadGame('runner')">Runner</div>
    <div class="gamebtn" onclick="loadGame('pong')">Pong</div>
    
    <div class="category">Creative</div>
    <div class="gamebtn" onclick="loadGame('pixelArt')">Pixel Art</div>
    
    <div class="category">Emulators</div>
    <div class="gamebtn" onclick="loadGame('nes')">NES Emulator</div>
    
    <div class="category">Sandbox</div>
    <div class="gamebtn" onclick="loadGame('mineclone')">Minecraft Clone</div>
  </div>

  <div id="gamearea">
    <button id="panic" onclick="panic()">⚪ Panic</button>
    <canvas id="game" width="640" height="400"></canvas>
  </div>
</div>

<script>
let currentGame=null;
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

// panic function
function panic(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

// dynamic game loader
function loadGame(name){
    if(currentGame && currentGame.stop) currentGame.stop();
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(window.games[name]){
        currentGame=window.games[name](canvas,ctx);
    }else{
        ctx.fillText("Game not found",280,200);
    }
}
</script>

<script src="games.js"></script>
</body>
</html>
